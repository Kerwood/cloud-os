modules:
  - type: script
    scripts:
      - install-github-releases.sh
      - setup-gcloud-repo.sh
      - setup-hashicorp-repo.sh

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-%OS_VERSION%/ublue-os-staging-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/atim/lazygit/repo/fedora-%OS_VERSION%/atim-lazygit-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/monkeygold/nautilus-open-any-terminal/repo/fedora-%OS_VERSION%/monkeygold-nautilus-open-any-terminal-fedora-%OS_VERSION%.repo
      - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
      - https://download.docker.com/linux/fedora/docker-ce.repo
    install:
      - nautilus-open-any-terminal
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - starship
      - zsh
      - jq
      - yq
      - httpie
      - ripgrep
      - bat
      - just
      - git
      - neovim
      - xclip
      - azure-cli
      - google-cloud-cli
      - google-cloud-cli-gke-gcloud-auth-plugin
      - distrobox
      - lazygit
      - fzf
      - btop
      - stow
      - sslscan
      - helm
      - zoxide
      - duf
      - ncdu
      - ShellCheck
      - tailscale
      - terraform
      - fuse-sshfs
      - git-delta
      - screen
      - dua-cli
      - gh
      - fd-find
    remove:
      - nvtop
